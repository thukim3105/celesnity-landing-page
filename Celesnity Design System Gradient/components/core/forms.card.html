<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--cosmic-black);font-family:var(--font-sans);padding:28px 32px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body class="cosmos">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Switch } = window.CelesnityDesignSystem_29274a;
const Mail = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>;
function Demo(){
  const [a,setA]=React.useState(true),[b,setB]=React.useState(false);
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Email" placeholder="you@stars.io" iconLeft={<Mail/>} defaultValue=""/>
        <Input label="Location" error="We couldn't find that place" defaultValue="Andromeda"/>
      </div>
      <div className="stack">
        <Input label="Observer name" placeholder="Enter your name" hint="Shown on shared sky maps"/>
        <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:6}}>
          <Switch checked={a} onChange={setA} label="Cosmos mode"/>
          <Switch checked={b} onChange={setB} label="Meteor alerts"/>
          <Switch checked={false} disabled label="Location (off)"/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
