<!-- @dsCard group="Spacing" viewport="700x190" name="Corner radii" subtitle="From 6px inputs to fully-round pills" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--cosmic-black);font-family:var(--font-sans);color:#F8F9FE;padding:26px 30px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:82px;height:70px;background:var(--surface-card);border:1px solid var(--hairline-dark);box-shadow:var(--rim-light)}
  .t{font-size:11px;color:var(--starlight-dim)}
  .k{font-size:11px;font-weight:600}
</style></head>
<body class="cosmos">
  <div class="row" id="r"></div>
  <script>
    const radii=[['xs','6px'],['sm','10px'],['md','16px'],['lg','20px'],['xl','28px'],['2xl','36px'],['pill','999px']];
    document.getElementById('r').innerHTML=radii.map(([k,v])=>
      `<div class="cell"><div class="box" style="border-radius:${v}"></div><div class="k">${k}</div><div class="t">${v}</div></div>`
    ).join('');
  </script>
</body></html>
