<!-- @dsCard group="Colors" viewport="700x180" name="Signature gradients" subtitle="Nebula (dark) and Daybreak (light) accent washes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--cosmic-black);font-family:var(--font-sans);padding:26px 30px;display:flex;flex-direction:column;gap:16px}
  .band{height:56px;border-radius:16px;display:flex;align-items:center;padding:0 20px;color:#fff;font-size:13px;font-weight:600;letter-spacing:.01em}
  .sub{font-weight:400;color:rgba(255,255,255,.85);margin-left:10px;font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="band" style="background:var(--nebula-gradient)">Nebula gradient <span class="sub">#2D44E0 → #6E1FC6 → #B14FD0</span></div>
  <div class="band" style="background:var(--daybreak-gradient)">Daybreak gradient <span class="sub">#2D44E0 → #8739E0 → #BC67D5</span></div>
  <div class="band" style="background:var(--cosmos-wash);border:1px solid var(--hairline-dark)">Cosmos wash <span class="sub">radial · #241660 → #12093B → #05060F</span></div>
</body></html>
