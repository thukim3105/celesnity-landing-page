<!-- @dsCard group="Colors" viewport="700x210" name="Cosmos · Dark palette" subtitle="Night-sky surfaces lit by a cobalt-to-magenta nebula" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--cosmic-black);font-family:var(--font-sans);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .sw{display:flex;flex-direction:column;gap:9px}
  .chip{height:76px;border-radius:14px;border:1px solid var(--hairline-dark)}
  .n{font-size:12.5px;font-weight:600;color:#F8F9FE}
  .r{font-size:11px;color:var(--starlight-dim);font-variant-numeric:tabular-nums}
  .u{font-size:10px;color:var(--starlight-dim);letter-spacing:.04em}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#05060F"></div><div class="n">Cosmic Black</div><div class="u">Primary surface</div><div class="r">#05060F</div></div>
  <div class="sw"><div class="chip" style="background:#1A0E4D"></div><div class="n">Deep Indigo</div><div class="u">Raised surface</div><div class="r">#1A0E4D</div></div>
  <div class="sw"><div class="chip" style="background:#2D44E0"></div><div class="n">Cobalt Blue</div><div class="u">Primary accent</div><div class="r">#2D44E0</div></div>
  <div class="sw"><div class="chip" style="background:#6E1FC6"></div><div class="n">Violet</div><div class="u">Secondary</div><div class="r">#6E1FC6</div></div>
  <div class="sw"><div class="chip" style="background:#B14FD0"></div><div class="n">Nebula Magenta</div><div class="u">Highlight</div><div class="r">#B14FD0</div></div>
  <div class="sw"><div class="chip" style="background:#C9CEE8"></div><div class="n">Starlight</div><div class="u">Text on dark</div><div class="r">#C9CEE8</div></div>
</div>
</body></html>
