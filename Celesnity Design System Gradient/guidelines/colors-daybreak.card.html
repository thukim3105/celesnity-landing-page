<!-- @dsCard group="Colors" viewport="700x210" name="Daybreak · Light palette" subtitle="The cosmic palette lifted into airy near-white surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--cloud-white);font-family:var(--font-sans);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .sw{display:flex;flex-direction:column;gap:9px}
  .chip{height:76px;border-radius:14px;border:1px solid var(--hairline-light)}
  .n{font-size:12.5px;font-weight:600;color:#1C2240}
  .r{font-size:11px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .u{font-size:10px;color:var(--ink-dim);letter-spacing:.04em}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#F8F9FE"></div><div class="n">Cloud White</div><div class="u">Background · 60%</div><div class="r">#F8F9FE</div></div>
  <div class="sw"><div class="chip" style="background:#EEECF8"></div><div class="n">Lavender Mist</div><div class="u">Cards · 30%</div><div class="r">#EEECF8</div></div>
  <div class="sw"><div class="chip" style="background:#2D44E0"></div><div class="n">Cobalt Blue</div><div class="u">Accent · 10%</div><div class="r">#2D44E0</div></div>
  <div class="sw"><div class="chip" style="background:#8739E0"></div><div class="n">Violet</div><div class="u">Secondary</div><div class="r">#8739E0</div></div>
  <div class="sw"><div class="chip" style="background:#BC67D5"></div><div class="n">Nebula Magenta</div><div class="u">Highlight</div><div class="r">#BC67D5</div></div>
  <div class="sw"><div class="chip" style="background:#1C2240"></div><div class="n">Ink</div><div class="u">Text on light</div><div class="r">#1C2240</div></div>
</div>
</body></html>
