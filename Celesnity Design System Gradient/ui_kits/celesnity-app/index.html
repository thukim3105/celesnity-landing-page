<!-- @dsCard group="Celesnity App" viewport="900x620" name="Stargazing app" subtitle="Interactive mobile app · Cosmos & Daybreak modes · login → tonight → explore → plan" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Celesnity · Stargazing app</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 120% at 20% 0%, #150b3e 0%, #0a0722 45%, #05060F 100%);
    min-height:100%;
    display:flex;align-items:center;justify-content:center;
    padding:40px 20px;font-family:var(--font-sans);
  }
  .stage{display:flex;align-items:center;gap:56px;flex-wrap:wrap;justify-content:center}
  .intro{max-width:300px}
  .intro .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(201,206,232,.6);font-weight:600}
  .intro h2{font-size:34px;line-height:1.06;letter-spacing:-.03em;color:#F8F9FE;margin:16px 0 12px;font-weight:700}
  .intro p{font-size:15px;line-height:1.65;color:var(--starlight);margin:0 0 20px}
  .hint{font-size:12.5px;color:rgba(201,206,232,.5);display:flex;align-items:center;gap:8px}
  @media (max-width:820px){.intro{display:none}}
  /* hide scrollbars inside the app (scroll still works) */
  #root *{scrollbar-width:none;-ms-overflow-style:none}
  #root *::-webkit-scrollbar{width:0;height:0;display:none}
</style>
</head>
<body>
<div class="stage">
  <div class="intro">
    <div class="eyebrow">Celesnity · UI Kit</div>
    <h2>The stargazing app</h2>
    <p>A working recreation of the Celesnity product. Sign in, then move between Tonight, Explore and Plan. Open Settings to switch between Cosmos (dark) and Daybreak (light).</p>
    <div class="hint">Tap "Start stargazing" to enter →</div>
  </div>
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  const App = window.CelApp;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
