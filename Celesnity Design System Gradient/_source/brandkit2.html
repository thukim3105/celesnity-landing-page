document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{ box-sizing:border-box; }\n  body{ margin:0; background:#3a3d52; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:1200px; margin:0 auto; font-family:'Inter',sans-serif; color:#1C2238; background:#F8F9FE;\">\n\n  <!-- ============ COVER ============ -->\n  <section data-screen-label=\"Bìa\" style=\"position:relative; overflow:hidden; background:#F8F9FE; color:#1C2240;\">\n    <div style=\"position:absolute; inset:0; background:linear-gradient(168deg, #FFFFFF 0%, #F4F3FD 56%, #F8F9FE 100%);\"><\u002Fdiv>\n    <div style=\"position:absolute; inset:0; background:radial-gradient(circle at 30% 20%, rgba(45,68,224,.08), transparent 35%), radial-gradient(circle at 70% 30%, rgba(135,57,224,.06), transparent 40%), radial-gradient(circle at 50% 60%, rgba(188,103,213,.04), transparent 45%);\"><\u002Fdiv>\n\n    <div style=\"position:relative; padding:90px 96px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <img src=\"b9822d2d-ee0a-40d5-bf83-89bc93d3c3e7\" alt=\"Celesnity\" style=\"width:54px; height:54px; display:block;\">\n          <span style=\"font-family:'Inter',sans-serif; font-weight:700; font-size:24px; letter-spacing:-0.01em; color:#1A0E4D;\">Celesnity<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'Inter',sans-serif; font-weight:500; font-size:13px; letter-spacing:0.3em; color:#6A6F8C;\">BỘ&nbsp;NHẬN&nbsp;DIỆN<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:110px; margin-bottom:8px;\">\n        <div style=\"font-family:'Inter',sans-serif; font-weight:500; font-size:15px; letter-spacing:0.42em; color:#2D44E0; margin-bottom:34px;\">HỆ THỐNG NHẬN DIỆN HÌNH ẢNH · v1.0<\u002Fdiv>\n        <h1 style=\"font-family:'Inter',sans-serif; font-weight:700; font-size:184px; line-height:0.92; letter-spacing:-0.04em; margin:0; color:#1C2240;\">Celesnity<\u002Fh1>\n        <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:26px; line-height:1.5; color:#4A5070; max-width:680px; margin:38px 0 0;\">Một hệ thống thương hiệu thiên hà dựng trên hai thế giới — chế độ tối vũ trụ và chế độ sáng ấm áp ánh nắng.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:64px; display:flex; gap:14px;\">\n        <span style=\"width:64px; height:64px; border-radius:14px; background:#2D44E0;\"><\u002Fspan>\n        <span style=\"width:64px; height:64px; border-radius:14px; background:#6E1FC6;\"><\u002Fspan>\n        <span style=\"width:64px; height:64px; border-radius:14px; background:#B14FD0;\"><\u002Fspan>\n        <span style=\"flex:1;\"><\u002Fspan>\n        <span style=\"width:64px; height:64px; border-radius:14px; background:#8739E0;\"><\u002Fspan>\n        <span style=\"width:64px; height:64px; border-radius:14px; background:#BC67D5;\"><\u002Fspan>\n        <span style=\"width:64px; height:64px; border-radius:14px; background:#EEECF8; border:1px solid #E4E4F4;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ STORY ============ -->\n  <section data-screen-label=\"Câu chuyện\" style=\"padding:120px 96px; background:#F8F9FE;\">\n    <div style=\"display:grid; grid-template-columns:0.9fr 1.1fr; gap:80px; align-items:start;\">\n      <div>\n        <div style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.32em; color:#2D44E0;\">01 — TINH THẦN<\u002Fdiv>\n        <h2 style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:56px; line-height:1.05; letter-spacing:-0.02em; margin:22px 0 0; color:#1C2238;\">Hai bầu trời,<br>một bản sắc.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-family:'Inter',sans-serif; font-weight:400; font-size:21px; line-height:1.7; color:#3a4055; margin:0 0 28px;\">Celesnity chuyển động giữa hai trạng thái của cùng một bầu trời. <strong style=\"font-weight:700;\">Chế độ tối<\u002Fstrong> là màn đêm — sắc chàm vũ trụ sâu thẳm được thắp sáng bởi những tinh vân xanh coban, tím và hồng đỏ. <strong style=\"font-weight:700;\">Chế độ sáng<\u002Fstrong> là bình minh — vẫn những sắc màu vũ trụ ấy được nâng lên thành các bề mặt gần trắng, thoáng đãng, giữ nguyên các màu nhấn.<\u002Fp>\n        <p style=\"font-family:'Inter',sans-serif; font-weight:400; font-size:21px; line-height:1.7; color:#3a4055; margin:0;\">Toàn bộ chữ được trình bày bằng <strong style=\"font-weight:700;\">Inter<\u002Fstrong> — một họ phông linh hoạt mang cả sự tự tin hình học của tiêu đề lẫn sự dễ đọc điềm tĩnh của nội dung. Một phông chữ duy nhất giữ cho thương hiệu tự tin, hiện đại và gần gũi.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ LOGO ============ -->\n  <section data-screen-label=\"Logo\" style=\"padding:24px 96px 120px; background:#F8F9FE;\">\n    <div style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.32em; color:#2D44E0;\">02 — LOGO<\u002Fdiv>\n    <h2 style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:56px; line-height:1.05; letter-spacing:-0.02em; margin:22px 0 56px; color:#1C2238;\">Biểu tượng<\u002Fh2>\n\n    <div style=\"display:grid; grid-template-columns:1.4fr 1fr; gap:28px;\">\n      <!-- primary on dark -->\n      <div style=\"position:relative; border-radius:24px; overflow:hidden; min-height:440px; display:flex; align-items:center; justify-content:center; background:#05060F;\">\n        <div style=\"position:absolute; inset:0; overflow:hidden;\">\n          <div style=\"position:absolute; top:14%; left:-30%; width:160%; height:190px; transform:rotate(-20deg); filter:blur(66px); opacity:0.72; background:linear-gradient(90deg, rgba(45,68,224,0) 0%, #2D44E0 38%, #B14FD0 82%, rgba(177,79,208,0) 100%);\"><\u002Fdiv>\n          <div style=\"position:absolute; bottom:10%; left:-20%; width:150%; height:150px; transform:r
